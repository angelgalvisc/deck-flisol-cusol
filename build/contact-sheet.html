<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>contact sheet</title>
<style>
  :root {
    --ink: #0F0E12;
    --mute: #7C7B80;
    --bg: #f5f5f5;
    --coral: #DD4B29;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    font-family: "Helvetica Neue", "Inter", system-ui, sans-serif;
    color: var(--ink);
    padding: 32px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .meta {
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--mute);
    letter-spacing: 0.06em;
    margin-bottom: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }
  .cell {
    border: 1px solid #ddd;
    background: white;
    overflow: hidden;
  }
  .num {
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--coral);
    padding: 6px 10px;
    border-bottom: 1px solid #eee;
    letter-spacing: 0.08em;
  }
  .cell img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
<h1>contact sheet</h1>
<div class="meta">23 slides · revisión por imagen · sin depender del viewer de PDF</div>
